<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamePickerOnline | RAWG Style</title>
    <link rel="icon" type="image/jpeg" href="Logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .game-card:hover { transform: scale(1.02); transition: transform 0.2s ease; }
        #toast { transition: opacity 0.3s, transform 0.3s; }
        .modal-bg { background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px); }
        #lightbox { backdrop-filter: blur(8px); }
        .lightbox-img-enter { transform: scale(0.95); opacity: 0; }
        .lightbox-img-active { transform: scale(1); opacity: 1; transition: all 0.3s ease-out; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #151515; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="bg-[#151515] text-[#E0E0E0] min-h-screen font-sans pb-12 relative overflow-x-hidden">

    <div id="toast" class="fixed top-5 right-5 bg-white text-black px-6 py-3 rounded shadow-lg font-bold opacity-0 translate-y-[-20px] pointer-events-none z-[200]">Уведомление</div>

    <div id="authModal" class="fixed inset-0 modal-bg hidden flex items-center justify-center z-[150] fade-in">
        <div class="bg-[#202020] p-8 rounded shadow-2xl border border-gray-700 w-full max-w-md relative text-center">
            <button onclick="closeAuthModal()" class="absolute top-4 right-5 text-gray-500 hover:text-white text-2xl">✕</button>
            <h2 id="authTitle" class="text-3xl font-black mb-6 text-white tracking-wide uppercase">ВХОД</h2>
            <input type="text" id="authUsername" placeholder="Логин" class="w-full px-4 py-3 mb-4 rounded bg-[#151515] border border-gray-700 text-white focus:outline-none focus:border-gray-400">
            <input type="password" id="authPassword" placeholder="Пароль (от 6 символов)" class="w-full px-4 py-3 mb-6 rounded bg-[#151515] border border-gray-700 text-white focus:outline-none focus:border-gray-400">
            <button id="authBtn" onclick="submitAuth()" class="w-full py-3 bg-white text-black hover:bg-gray-200 rounded font-black text-lg transition-colors mb-4 uppercase tracking-wider">Войти</button>
            <p class="text-center text-gray-400 text-sm mb-4"><span id="authToggleText">Нет аккаунта?</span> <button onclick="toggleAuthMode()" id="authToggleBtn" class="text-white hover:text-gray-300 font-bold ml-1 uppercase">Регистрация</button></p>
            <div class="flex items-center my-4"><div class="flex-grow border-t border-gray-700"></div><span class="px-3 text-gray-500 text-sm font-bold uppercase">или</span><div class="flex-grow border-t border-gray-700"></div></div>
            <div id="g_id_onload" data-client_id="67328762736-1pba95enhuh3c7jvlt38benvhhfruot2.apps.googleusercontent.com" data-context="signin" data-ux_mode="popup" data-callback="handleGoogleLogin" data-auto_prompt="false"></div>
            <div class="flex justify-center"><div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="filled_black" data-text="signin_with" data-size="large" data-logo_alignment="left"></div></div>
        </div>
    </div>

    <div id="threadModal" class="fixed inset-0 modal-bg hidden flex items-center justify-center z-[150] fade-in">
        <div class="bg-[#202020] p-8 rounded shadow-2xl border border-gray-700 w-full max-w-lg relative">
            <button onclick="closeThreadModal()" class="absolute top-4 right-5 text-gray-500 hover:text-white text-2xl">✕</button>
            <h2 class="text-2xl font-black mb-6 text-white uppercase tracking-wide">Новое обсуждение</h2>
            <input type="text" id="newThreadTitle" placeholder="Заголовок темы" class="w-full px-4 py-3 mb-4 rounded bg-[#151515] border border-gray-700 text-white focus:outline-none focus:border-gray-400">
            <textarea id="newThreadMessage" placeholder="Ваше сообщение..." class="w-full px-4 py-3 mb-6 rounded bg-[#151515] border border-gray-700 text-white focus:outline-none focus:border-gray-400 h-32 resize-none"></textarea>
            <button onclick="submitNewThread()" class="w-full py-3 bg-white text-black hover:bg-gray-200 rounded font-black text-lg transition-colors uppercase tracking-wider">Создать тему</button>
        </div>
    </div>

    <div id="lightbox" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <button onclick="closeLightbox()" class="absolute top-5 right-6 text-white/50 hover:text-white text-5xl font-light transition-colors z-20 select-none">&times;</button>
        <button onclick="prevScreenshot(event)" class="absolute left-2 md:left-8 text-white/30 hover:text-white text-6xl font-light transition-colors select-none p-4 z-20">&lsaquo;</button>
        <img id="lightboxImage" src="" class="max-h-[90vh] max-w-[85vw] object-contain shadow-2xl rounded z-10 lightbox-img-enter mx-auto">
        <button onclick="nextScreenshot(event)" class="absolute right-2 md:right-8 text-white/30 hover:text-white text-6xl font-light transition-colors select-none p-4 z-20">&rsaquo;</button>
        <div id="lightboxCounter" class="absolute bottom-6 text-white/50 font-bold tracking-widest text-sm z-20"></div>
    </div>

    <div class="container mx-auto px-4 py-6 max-w-6xl">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4 border-b border-gray-800 pb-6">
            <h1 class="text-3xl md:text-4xl font-black text-white cursor-pointer tracking-tighter uppercase hover:text-gray-300 transition-colors" onclick="returnToMain()">
                GamePicker<span class="text-gray-500">Online</span>
            </h1>
            <div class="flex items-center gap-2 md:gap-4 flex-wrap justify-center">
                <button onclick="loadGlobalForum()" class="px-4 py-2 bg-[#202020] hover:bg-[#2a2a2a] rounded font-bold transition-colors text-sm uppercase tracking-wider border border-gray-800">Форум</button>
                <button onclick="loadCabinet()" class="px-4 py-2 bg-[#202020] hover:bg-[#2a2a2a] rounded font-bold transition-colors text-sm uppercase tracking-wider border border-gray-800">Коллекция</button>
                <div id="userPanel" class="flex items-center gap-3 border-l border-gray-700 pl-3 md:pl-4">
                    <button onclick="openAuthModal('login')" class="px-5 py-2 bg-white text-black hover:bg-gray-200 rounded font-black transition-colors text-sm uppercase">Войти</button>
                </div>
            </div>
        </div>
        
        <div id="mainView" class="fade-in">
            <div id="searchBlock" class="flex gap-2 mb-8 max-w-2xl mx-auto">
                <input type="text" id="gameInput" onkeypress="if(event.key === 'Enter') startSearch()" placeholder="Поиск 500,000+ игр..." class="w-full px-4 py-3 rounded bg-[#202020] border border-gray-800 text-white focus:outline-none focus:border-gray-500 transition-colors placeholder-gray-600">
                <button onclick="startSearch()" class="px-8 py-3 rounded bg-white text-black hover:bg-gray-200 font-black transition-colors uppercase tracking-wider">Найти</button>
            </div>
            <h2 id="mainSubtitle" class="text-3xl font-black text-white mb-6 uppercase tracking-tight">Популярное сейчас</h2>
            <div id="gamesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
            <div id="loadingIndicator" class="text-center font-bold text-gray-500 my-8 hidden uppercase tracking-widest">Загрузка...</div>
        </div>

        <div id="cabinetView" class="hidden fade-in">
            <div class="bg-[#202020] rounded p-6 mb-8 border border-gray-800 flex flex-col md:flex-row items-center gap-6">
                <img id="cabinetAvatar" src="" class="w-20 h-20 rounded border-2 border-gray-600 object-cover">
                <div class="text-center md:text-left">
                    <h2 id="cabinetUsername" class="text-3xl font-black text-white uppercase tracking-tight">User</h2>
                    <p class="text-sm text-gray-400 font-bold uppercase mt-1">Игр на полке: <span id="cabinetTotalGames" class="text-white">0</span></p>
                </div>
            </div>
            <h2 class="text-2xl font-black text-white mb-6 uppercase tracking-tight">Моя полка</h2>
            <div id="cabinetGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="globalForumView" class="hidden fade-in">
            <h2 class="text-3xl font-black text-white mb-6 uppercase tracking-tight">Обсуждения сообщества</h2>
            <div id="globalForumList" class="flex flex-col gap-3"></div>
        </div>

        <div id="threadView" class="hidden fade-in max-w-3xl mx-auto">
            <button onclick="returnToGlobalForum()" class="mb-4 text-gray-500 hover:text-white font-bold uppercase text-sm flex items-center gap-1">← Назад к форуму</button>
            <div class="bg-[#202020] rounded p-6 border border-gray-800 mb-6">
                <h2 id="threadTitle" class="text-2xl font-black text-white mb-2 leading-tight">Загрузка...</h2>
            </div>
            <div id="threadMessages" class="flex flex-col gap-4 mb-6"></div>
            <div class="bg-[#202020] rounded p-4 border border-gray-800 flex gap-2">
                <input type="text" id="replyInput" onkeypress="if(event.key === 'Enter') submitReply()" placeholder="Написать ответ..." class="w-full px-4 py-3 rounded bg-[#151515] border border-gray-700 text-white focus:outline-none focus:border-gray-500">
                <button onclick="submitReply()" class="px-6 py-3 rounded bg-[#43A047] text-white hover:bg-green-600 font-black transition-colors uppercase tracking-wider">Send</button>
            </div>
        </div>

        <div id="detailView" class="hidden fade-in max-w-5xl mx-auto">
            <button onclick="returnToMain()" class="mb-4 text-gray-500 hover:text-white font-bold uppercase text-sm flex items-center gap-1">← Назад</button>
            <div class="bg-[#202020] rounded overflow-hidden border border-gray-800">
                <div class="relative"><img id="detailImage" src="" class="w-full h-[400px] object-cover opacity-80"></div>
                <div class="p-6 md:p-10">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 id="detailTitle" class="text-4xl md:text-5xl font-black text-white uppercase tracking-tighter leading-none mb-3">Игра</h2>
                            <p id="detailDevelopers" class="text-gray-400 font-bold text-sm uppercase">Студия: </p>
                            <p id="detailDate" class="text-gray-500 text-sm mt-1 uppercase font-bold">Релиз: </p>
                        </div>
                        <div id="detailMeta" class="flex-shrink-0 flex items-center justify-center w-16 h-16 rounded font-black text-2xl border-2 bg-[#151515]"></div>
                    </div>

                    <div class="flex flex-wrap gap-3 mb-10">
                        <button id="btnFavorite" onclick="toggleFavorite()" class="px-6 py-3 bg-white text-black hover:bg-gray-200 rounded font-black transition-colors uppercase tracking-wider text-sm flex items-center gap-2">
                            + ДОБАВИТЬ В КОЛЛЕКЦИЮ
                        </button>
                    </div>

                    <div class="mb-10">
                        <h3 class="text-lg font-black text-white mb-4 uppercase tracking-widest border-b border-gray-800 pb-2">Об игре</h3>
                        <p id="detailDescription" class="text-gray-300 leading-relaxed text-sm md:text-base whitespace-pre-line"></p>
                    </div>

                    <div id="screenshotsBlock" class="mb-10 hidden">
                        <h3 class="text-lg font-black text-white mb-4 uppercase tracking-widest border-b border-gray-800 pb-2">Медиа</h3>
                        <div id="screenshotsContainer" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
                    </div>

                    <div id="steamReviewsBlock" class="mb-10 hidden">
                        <h3 class="text-lg font-black text-white mb-4 uppercase tracking-widest border-b border-gray-800 pb-2">Steam Отзывы</h3>
                        <div id="steamReviewsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                    </div>

                    <div id="gameForumBlock" class="mb-10">
                        <div class="flex justify-between items-end border-b border-gray-800 pb-2 mb-4">
                            <h3 class="text-lg font-black text-white uppercase tracking-widest">Обсуждения</h3>
                            <button onclick="openThreadModal()" class="text-[#43A047] hover:text-green-400 font-bold uppercase text-xs tracking-wider">+ Создать</button>
                        </div>
                        <div id="gameForumList" class="flex flex-col gap-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const API_BASE = isLocal ? 'http://localhost:8000' : 'https://gamepickeronline.onrender.com';

        let currentGameData = null;
        let isLoginMode = true; 
        let currentScreenshots = [];
        let currentScreenshotIndex = 0;
        let favoriteSlugs = new Set();
        
        let currentPage = 1;
        let isFetching = false;
        let hasMoreGames = true;
        let currentSearchQuery = '';
        let currentView = 'main'; 

        // ИСПРАВЛЕНИЕ: Переменные для анти-спама кнопки Избранного
        let isFavoriteActionRunning = false;
        let favoriteClickCount = 0;

        function getHeaders() {
            const token = localStorage.getItem('token');
            return token ? { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } : { 'Content-Type': 'application/json' };
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed top-5 right-5 px-6 py-3 rounded shadow-lg font-bold transition-all z-[200] ${isError ? 'bg-red-600 text-white' : 'bg-white text-black'}`;
            toast.style.opacity = '1'; toast.style.transform = 'translateY(0)';
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(-20px)'; }, 3000);
        }

        function getScoreColorClass(s) { return !s ? 'border-gray-700 text-gray-500' : s>=80 ? 'border-[#43A047] text-[#43A047]' : s>=50 ? 'border-yellow-500 text-yellow-500' : 'border-red-500 text-red-500'; }

        async function checkAuth() {
            const token = localStorage.getItem('token');
            const username = localStorage.getItem('username');
            const avatar = localStorage.getItem('avatar_url') || `https://api.dicebear.com/7.x/bottts/svg?seed=${username}`;
            const userPanel = document.getElementById('userPanel');
            if (token && username) {
                userPanel.innerHTML = `<img src="${avatar}" class="w-8 h-8 rounded border border-gray-600 object-cover hidden md:block"><button onclick="logout()" class="px-4 py-2 bg-red-900/30 text-red-400 hover:bg-red-900 hover:text-white rounded font-bold transition-colors text-sm uppercase">Выйти</button>`;
                try {
                    const res = await fetch(`${API_BASE}/api/favorites?t=${Date.now()}`, { headers: getHeaders() });
                    if(res.ok) { const favs = await res.json(); favoriteSlugs = new Set(favs.map(f => f.slug)); }
                } catch(e) {}
            } else {
                favoriteSlugs.clear();
                userPanel.innerHTML = `<button onclick="openAuthModal('login')" class="px-5 py-2 bg-white text-black hover:bg-gray-200 rounded font-black transition-colors text-sm uppercase">Войти</button>`;
            }
        }

        function openAuthModal(mode) { document.getElementById('authModal').classList.remove('hidden'); isLoginMode = mode !== 'register'; toggleAuthMode(true); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }
        function toggleAuthMode(forceUpdate = false) {
            if (!forceUpdate) isLoginMode = !isLoginMode;
            document.getElementById('authTitle').textContent = isLoginMode ? 'ВХОД' : 'РЕГИСТРАЦИЯ';
            document.getElementById('authBtn').textContent = isLoginMode ? 'Войти' : 'Создать';
            document.getElementById('authToggleText').textContent = isLoginMode ? 'Нет аккаунта?' : 'Уже есть аккаунт?';
            document.getElementById('authToggleBtn').textContent = isLoginMode ? 'Регистрация' : 'Войти';
            const googleBlock = document.querySelector('.g_id_signin'); if (googleBlock) googleBlock.style.display = isLoginMode ? 'block' : 'none';
        }

        async function submitAuth() {
            const username = document.getElementById('authUsername').value.trim(); const password = document.getElementById('authPassword').value.trim();
            if (!username || !password) return showToast("Заполните все поля", true);
            try {
                const response = await fetch(`${API_BASE}${isLoginMode ? '/api/login' : '/api/register'}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
                const data = await response.json();
                if (data.error) showToast(data.error, true);
                else {
                    showToast(data.message);
                    if (isLoginMode) { localStorage.setItem('token', data.token); localStorage.setItem('username', data.username); localStorage.setItem('avatar_url', data.avatar_url); closeAuthModal(); checkAuth(); } 
                    else toggleAuthMode();
                }
            } catch (error) { showToast("Ошибка сервера", true); }
        }

        async function handleGoogleLogin(response) {
            try {
                const res = await fetch(`${API_BASE}/api/google-login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ credential: response.credential }) });
                const data = await res.json();
                if (data.error) showToast(data.error, true);
                else { showToast(data.message); localStorage.setItem('token', data.token); localStorage.setItem('username', data.username); localStorage.setItem('avatar_url', data.avatar_url); closeAuthModal(); checkAuth(); }
            } catch (error) { showToast("Ошибка связи", true); }
        }

        function logout() { localStorage.clear(); checkAuth(); showToast("Вы вышли из аккаунта"); returnToMain(); }

        function hideAllViews() { ['mainView', 'detailView', 'cabinetView', 'globalForumView', 'threadView'].forEach(id => document.getElementById(id).classList.add('hidden')); }

        function returnToMain() {
            hideAllViews(); currentView = 'main'; document.getElementById('mainView').classList.remove('hidden');
            if(document.getElementById('gamesGrid').innerHTML === '') loadGames(true);
        }

        function createGameCardHTML(game) {
            return `<div onclick="openGameDetails('${game.slug}')" class="game-card bg-[#202020] rounded border border-gray-800 flex flex-col cursor-pointer group overflow-hidden">
                    <div class="h-40 overflow-hidden bg-[#151515]"><img src="${game.image_url}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 opacity-90 group-hover:opacity-100" loading="lazy"></div>
                    <div class="p-4 flex flex-col flex-grow">
                        <div class="flex justify-between items-start">
                            <h2 class="text-lg font-bold leading-tight pr-2 text-white">${game.name}</h2>
                            <div class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded font-bold text-xs border ${getScoreColorClass(game.metacritic_score)}">${game.metacritic_score || 'N/A'}</div>
                        </div>
                    </div></div>`;
        }

        async function loadGames(reset = false) {
            if (isFetching || (!hasMoreGames && !reset)) return;
            isFetching = true;
            if (reset) { currentPage = 1; hasMoreGames = true; document.getElementById('gamesGrid').innerHTML = ''; window.scrollTo(0,0); }
            document.getElementById('loadingIndicator').classList.remove('hidden');
            try {
                const endpoint = currentSearchQuery ? `/api/search?query=${currentSearchQuery}&page=${currentPage}` : `/api/top-games?page=${currentPage}&page_size=16`;
                const res = await fetch(`${API_BASE}${endpoint}`);
                const games = await res.json();
                if (games.error) { if(reset) document.getElementById('gamesGrid').innerHTML = `<div class="col-span-full text-center text-gray-500">${games.error}</div>`; hasMoreGames = false; } 
                else if (games.length === 0) { hasMoreGames = false; } 
                else { const grid = document.getElementById('gamesGrid'); games.forEach(g => grid.innerHTML += createGameCardHTML(g)); currentPage++; }
            } catch(e) {}
            isFetching = false; document.getElementById('loadingIndicator').classList.add('hidden');
        }

        function startSearch() {
            currentSearchQuery = document.getElementById('gameInput').value.trim();
            document.getElementById('mainSubtitle').textContent = currentSearchQuery ? `ПОИСК: ${currentSearchQuery}` : "ПОПУЛЯРНОЕ СЕЙЧАС";
            loadGames(true);
        }

        window.addEventListener('scroll', () => { if (currentView === 'main' && window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) loadGames(); });

        async function openGameDetails(slug) {
            hideAllViews(); currentView = 'detail'; document.getElementById('detailView').classList.remove('hidden'); window.scrollTo(0, 0);
            document.getElementById('detailTitle').textContent = "Загрузка..."; document.getElementById('screenshotsBlock').classList.add('hidden'); document.getElementById('steamReviewsBlock').classList.add('hidden'); document.getElementById('gameForumList').innerHTML = '<span class="text-gray-500 text-sm">Загрузка обсуждений...</span>';
            try {
                const res = await fetch(`${API_BASE}/api/games/${slug}`); const game = await res.json();
                if(game.error) return returnToMain();

                currentGameData = { slug, name: game.name, image_url: game.image_url, metacritic_score: game.metacritic_score };
                document.getElementById('detailTitle').textContent = game.name; document.getElementById('detailImage').src = game.image_url; document.getElementById('detailDate').textContent = `Релиз: ${game.release_date || '---'}`; document.getElementById('detailDevelopers').textContent = `Студия: ${game.developers?.join(', ') || '---'}`; document.getElementById('detailDescription').textContent = game.description || 'Описание отсутствует.';
                
                const metaScore = document.getElementById('detailMeta'); metaScore.textContent = game.metacritic_score || '-'; metaScore.className = `flex-shrink-0 flex items-center justify-center w-16 h-16 rounded font-black text-2xl border-2 bg-[#151515] ${getScoreColorClass(game.metacritic_score)}`;

                // ИСПРАВЛЕНИЕ: Динамическое обновление кнопки при входе на страницу
                const favBtn = document.getElementById('btnFavorite');
                if (favoriteSlugs.has(slug)) {
                    favBtn.className = "px-6 py-3 bg-red-600/20 text-red-500 hover:bg-red-600 hover:text-white rounded font-black uppercase tracking-wider text-sm flex items-center gap-2 cursor-pointer transition-colors border border-red-500";
                    favBtn.innerHTML = "✖ УБРАТЬ С ПОЛКИ";
                } else {
                    favBtn.className = "px-6 py-3 bg-[#43A047] text-white hover:bg-green-600 rounded font-black uppercase tracking-wider text-sm flex items-center gap-2 cursor-pointer transition-colors";
                    favBtn.innerHTML = "+ ДОБАВИТЬ В КОЛЛЕКЦИЮ";
                }

                const scrCont = document.getElementById('screenshotsContainer'); scrCont.innerHTML = '';
                if (game.screenshots?.length > 0) {
                    currentScreenshots = game.screenshots; game.screenshots.forEach((img, idx) => { scrCont.innerHTML += `<img src="${img}" class="w-full h-24 md:h-32 object-cover rounded cursor-pointer opacity-80 hover:opacity-100 transition-opacity" onclick="openLightbox(${idx})">`; });
                    document.getElementById('screenshotsBlock').classList.remove('hidden');
                }

                const revCont = document.getElementById('steamReviewsContainer'); revCont.innerHTML = '';
                if (game.steam_reviews?.length > 0) {
                    game.steam_reviews.forEach(rev => { const isGood = rev.voted_up; const icon = isGood ? '👍' : '👎'; const color = isGood ? 'text-[#43A047]' : 'text-red-500'; revCont.innerHTML += `<div class="bg-[#151515] p-4 rounded border border-gray-800"><div class="font-bold mb-2 ${color} text-sm">${icon} ${isGood ? 'Рекомендую' : 'Не рекомендую'}</div><p class="text-gray-400 text-xs italic">"${rev.review}"</p></div>`; });
                    document.getElementById('steamReviewsBlock').classList.remove('hidden');
                }
                loadGameThreads(slug);
            } catch (e) { returnToMain(); }
        }

        // ИСПРАВЛЕНИЕ: Умная кнопка с защитой от спама и переключением
        async function toggleFavorite() {
            if (!localStorage.getItem('token')) { showToast("Войдите в аккаунт!", true); return openAuthModal('login'); }
            if (!currentGameData) return;

            // Защита от спама (Debounce)
            if (isFavoriteActionRunning) {
                favoriteClickCount++;
                if (favoriteClickCount > 1) showToast("Подождите, не кликайте так быстро! 🛑", true);
                return;
            }
            
            isFavoriteActionRunning = true;
            favoriteClickCount = 0;
            const btn = document.getElementById('btnFavorite');
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                if (favoriteSlugs.has(currentGameData.slug)) {
                    // Если игра уже на полке - удаляем
                    const res = await fetch(`${API_BASE}/api/favorites/${currentGameData.slug}`, { method: 'DELETE', headers: getHeaders() });
                    if (res.ok) {
                        favoriteSlugs.delete(currentGameData.slug);
                        btn.className = "px-6 py-3 bg-[#43A047] text-white hover:bg-green-600 rounded font-black uppercase tracking-wider text-sm flex items-center gap-2 cursor-pointer transition-colors";
                        btn.innerHTML = "+ ДОБАВИТЬ В КОЛЛЕКЦИЮ";
                        showToast("Игра удалена с полки");
                    }
                } else {
                    // Игры нет на полке - добавляем
                    const res = await fetch(`${API_BASE}/api/favorites`, { method: 'POST', headers: getHeaders(), body: JSON.stringify(currentGameData) });
                    const result = await res.json();
                    if (res.status === 401) { logout(); isFavoriteActionRunning = false; return; }
                    if (result.error && result.error !== "Эта игра уже есть в вашем списке!") { 
                        showToast(result.error, true); 
                    } else { 
                        favoriteSlugs.add(currentGameData.slug);
                        btn.className = "px-6 py-3 bg-red-600/20 text-red-500 hover:bg-red-600 hover:text-white rounded font-black uppercase tracking-wider text-sm flex items-center gap-2 cursor-pointer transition-colors border border-red-500";
                        btn.innerHTML = "✖ УБРАТЬ С ПОЛКИ";
                        showToast("Добавлено на полку!");
                    }
                }
            } catch (e) {
                showToast("Ошибка соединения", true);
            } finally {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                isFavoriteActionRunning = false;
            }
        }

        async function loadCabinet() {
            if (!localStorage.getItem('token')) { showToast("Войдите в аккаунт", true); return openAuthModal('login'); }
            hideAllViews(); currentView = 'cabinet'; document.getElementById('cabinetView').classList.remove('hidden');
            document.getElementById('cabinetUsername').textContent = localStorage.getItem('username'); document.getElementById('cabinetAvatar').src = localStorage.getItem('avatar_url') || `https://api.dicebear.com/7.x/bottts/svg?seed=${localStorage.getItem('username')}`;
            const grid = document.getElementById('cabinetGrid'); grid.innerHTML = '<div class="text-gray-500">Загрузка...</div>';
            try {
                const res = await fetch(`${API_BASE}/api/favorites?t=${Date.now()}`, { headers: getHeaders() });
                if (res.status === 401) return logout();
                const games = await res.json(); document.getElementById('cabinetTotalGames').textContent = games.length;
                if (games.length === 0) { grid.innerHTML = '<div class="text-gray-500">Коллекция пуста.</div>'; return; }
                grid.innerHTML = '';
                games.forEach(game => {
                    grid.innerHTML += `
                    <div class="bg-[#202020] rounded border border-gray-800 flex flex-col md:flex-row overflow-hidden cursor-pointer hover:border-gray-600 transition-colors" onclick="openGameDetails('${game.slug}')">
                        <img src="${game.image_url}" class="w-full md:w-32 h-32 object-cover opacity-90">
                        <div class="p-4 flex-grow flex flex-col justify-between">
                            <h3 class="text-lg font-bold text-white mb-2 leading-tight">${game.name}</h3>
                            <div class="flex justify-between items-center" onclick="event.stopPropagation()">
                                <select onchange="updateGameStatus('${game.slug}', this.value)" class="bg-[#151515] border border-gray-700 text-gray-300 text-xs rounded px-2 py-1 focus:outline-none focus:border-white cursor-pointer font-bold uppercase">
                                    <option value="В планах" ${game.status === 'В планах' ? 'selected' : ''}>⏳ В планах</option><option value="Играю" ${game.status === 'Играю' ? 'selected' : ''}>🔥 Играю</option><option value="Пройдено" ${game.status === 'Пройдено' ? 'selected' : ''}>🏆 Пройдено</option><option value="Брошено" ${game.status === 'Брошено' ? 'selected' : ''}>💔 Брошено</option>
                                </select>
                                <button onclick="removeFromFavorites('${game.slug}')" class="text-red-500 hover:text-red-400 text-xs font-bold uppercase tracking-wider ml-2">Удалить</button>
                            </div>
                        </div>
                    </div>`;
                });
            } catch (e) { grid.innerHTML = 'Ошибка загрузки.'; }
        }

        async function updateGameStatus(slug, newStatus) { try { await fetch(`${API_BASE}/api/favorites/${slug}/status`, { method: 'PATCH', headers: getHeaders(), body: JSON.stringify({ status: newStatus }) }); showToast("Статус изменен"); } catch (e) { showToast("Ошибка", true); } }
        async function removeFromFavorites(slug) { try { await fetch(`${API_BASE}/api/favorites/${slug}`, { method: 'DELETE', headers: getHeaders() }); favoriteSlugs.delete(slug); showToast("Удалено"); loadCabinet(); } catch (e) { showToast("Ошибка", true); } }

        // ИСПРАВЛЕНИЕ: Добавлен сброс кэша (?t=...) чтобы форум всегда был актуальным
        async function loadGlobalForum() {
            hideAllViews(); currentView = 'globalForum'; document.getElementById('globalForumView').classList.remove('hidden');
            const list = document.getElementById('globalForumList'); list.innerHTML = '<div class="text-gray-500">Загрузка...</div>';
            try {
                const res = await fetch(`${API_BASE}/api/forum/recent?t=${Date.now()}`);
                const threads = await res.json();
                if(threads.length === 0) { list.innerHTML = '<div class="text-gray-500">Пока нет обсуждений.</div>'; return; }
                list.innerHTML = '';
                threads.forEach(t => {
                    list.innerHTML += `
                    <div onclick="openThread(${t.id}, '${t.title}')" class="bg-[#202020] p-4 rounded border border-gray-800 hover:border-gray-500 cursor-pointer transition-colors">
                        <h3 class="text-white font-bold text-lg mb-1">${t.title}</h3>
                        <p class="text-[#43A047] text-xs font-black uppercase tracking-wider mb-2">Игра: ${t.game_slug}</p>
                        <p class="text-gray-500 text-xs">Автор: ${t.author} &bull; Ответов: ${t.messages_count}</p>
                    </div>`;
                });
            } catch(e) { list.innerHTML = 'Ошибка'; }
        }

        async function loadGameThreads(slug) {
            const list = document.getElementById('gameForumList');
            try {
                const res = await fetch(`${API_BASE}/api/forum/${slug}?t=${Date.now()}`);
                const threads = await res.json();
                if(threads.length === 0) { list.innerHTML = '<span class="text-gray-500 text-sm">Никто еще не обсуждал эту игру.</span>'; return; }
                list.innerHTML = '';
                threads.forEach(t => {
                    list.innerHTML += `
                    <div onclick="openThread(${t.id}, '${t.title}')" class="bg-[#151515] p-3 rounded border border-gray-800 hover:border-gray-600 cursor-pointer transition-colors">
                        <h4 class="text-white font-bold text-sm mb-1">${t.title}</h4>
                        <span class="text-gray-500 text-xs">Автор: ${t.author} &bull; Ответов: ${t.messages_count}</span>
                    </div>`;
                });
            } catch(e) { list.innerHTML = '<span class="text-red-500 text-sm">Ошибка загрузки</span>'; }
        }

        function returnToGlobalForum() { if(currentGameData) openGameDetails(currentGameData.slug); else loadGlobalForum(); }

        let currentThreadId = null;
        async function openThread(id, title) {
            hideAllViews(); currentView = 'thread'; currentThreadId = id; document.getElementById('threadView').classList.remove('hidden'); document.getElementById('threadTitle').textContent = title; document.getElementById('replyInput').value = ''; loadThreadMessages();
        }

        async function loadThreadMessages() {
            const list = document.getElementById('threadMessages'); list.innerHTML = '<span class="text-gray-500">Загрузка...</span>';
            try {
                const res = await fetch(`${API_BASE}/api/forum/thread/${currentThreadId}?t=${Date.now()}`);
                const msgs = await res.json();
                list.innerHTML = '';
                msgs.forEach(m => {
                    list.innerHTML += `
                    <div class="bg-[#202020] p-4 rounded border border-gray-800 flex gap-4">
                        <img src="${m.avatar_url}" class="w-10 h-10 rounded object-cover flex-shrink-0 opacity-80">
                        <div><div class="flex items-center gap-2 mb-1"><span class="text-white font-bold text-sm">${m.author}</span><span class="text-gray-600 text-xs">${m.created_at.substring(0,10)}</span></div><p class="text-gray-300 text-sm leading-relaxed">${m.content}</p></div>
                    </div>`;
                });
            } catch(e) {}
        }

        async function submitReply() {
            if (!localStorage.getItem('token')) { return showToast("Нужна авторизация", true); }
            const input = document.getElementById('replyInput'); const text = input.value.trim(); if(!text) return;
            try {
                const res = await fetch(`${API_BASE}/api/forum/message`, { method: 'POST', headers: getHeaders(), body: JSON.stringify({ thread_id: currentThreadId, content: text }) });
                const data = await res.json(); if(data.error) showToast(data.error, true); else { input.value = ''; loadThreadMessages(); }
            } catch(e) { showToast("Ошибка", true); }
        }

        function openThreadModal() { if (!localStorage.getItem('token')) { showToast("Сначала войдите в профиль!", true); openAuthModal('login'); return; } document.getElementById('threadModal').classList.remove('hidden'); }
        function closeThreadModal() { document.getElementById('threadModal').classList.add('hidden'); }
        async function submitNewThread() {
            const title = document.getElementById('newThreadTitle').value.trim(); const msg = document.getElementById('newThreadMessage').value.trim();
            if(!title || !msg) return showToast("Заполните поля", true);
            try {
                const res = await fetch(`${API_BASE}/api/forum/thread`, { method: 'POST', headers: getHeaders(), body: JSON.stringify({ game_slug: currentGameData.slug, title: title, message: msg }) });
                const data = await res.json();
                if(data.error) showToast(data.error, true); else { closeThreadModal(); showToast(data.message); loadGameThreads(currentGameData.slug); }
            } catch(e) { showToast("Ошибка", true); }
        }

        function openLightbox(idx) { currentScreenshotIndex = idx; const lb = document.getElementById('lightbox'); const lbImg = document.getElementById('lightboxImage'); updateLightbox(); lb.classList.remove('hidden'); setTimeout(() => { lb.classList.remove('opacity-0'); lbImg.classList.remove('lightbox-img-enter'); lbImg.classList.add('lightbox-img-active'); }, 10); document.body.style.overflow = 'hidden'; }
        function closeLightbox() { const lb = document.getElementById('lightbox'); const lbImg = document.getElementById('lightboxImage'); lb.classList.add('opacity-0'); lbImg.classList.remove('lightbox-img-active'); lbImg.classList.add('lightbox-img-enter'); setTimeout(() => { lb.classList.add('hidden'); document.body.style.overflow = ''; }, 300); }
        function prevScreenshot(e) { if(e) e.stopPropagation(); currentScreenshotIndex = (currentScreenshotIndex - 1 + currentScreenshots.length) % currentScreenshots.length; updateLightbox(); }
        function nextScreenshot(e) { if(e) e.stopPropagation(); currentScreenshotIndex = (currentScreenshotIndex + 1) % currentScreenshots.length; updateLightbox(); }
        function updateLightbox() { const lbImg = document.getElementById('lightboxImage'); lbImg.style.opacity = '0.5'; setTimeout(() => lbImg.style.opacity = '1', 50); lbImg.src = currentScreenshots[currentScreenshotIndex]; document.getElementById('lightboxCounter').textContent = `${currentScreenshotIndex + 1} / ${currentScreenshots.length}`; }
        document.addEventListener('keydown', (e) => { const lb = document.getElementById('lightbox'); if (!lb.classList.contains('hidden')) { if (e.key === 'Escape') closeLightbox(); if (e.key === 'ArrowLeft') prevScreenshot(); if (e.key === 'ArrowRight') nextScreenshot(); } });

        window.onload = () => { checkAuth(); loadGames(true); };
    </script>
</body>
